<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raw Video Clipper</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .container { max-width: 600px; margin: auto; border: 1px solid #444; padding: 20px; border-radius: 10px; }
        input, button { margin: 10px; padding: 10px; border-radius: 5px; border: none; }
        button { background: #ff4500; color: white; cursor: pointer; font-weight: bold; }
        #log { font-size: 12px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>✂️ Video Clipper</h1>
    <p>No login. No server. Just your browser.</p>
    
    <input type="file" id="uploader" accept="video/*"><br>
    <label>Start (sec):</label> <input type="number" id="start" value="0">
    <label>End (sec):</label> <input type="number" id="end" value="5"><br>
    
    <button id="exec">Clip Video</button>
    <div id="log">Status: Waiting for file...</div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    const el = document.getElementById('log');
    const btn = document.getElementById('exec');

    btn.onclick = async () => {
        const file = document.getElementById('uploader').files[0];
        if (!file) return alert("Select a file first");

        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;
        const duration = end - start;

        el.innerText = "Status: Loading FFmpeg engine (Wait 5s)...";
        if (!ffmpeg.isLoaded()) await ffmpeg.load();

        el.innerText = "Status: Processing video...";
        ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

        // The "Stupid" CLI command run inside your browser
        await ffmpeg.run('-i', 'input.mp4', '-ss', `${start}`, '-t', `${duration}`, '-c', 'copy', 'output.mp4');

        const data = ffmpeg.FS('readFile', 'output.mp4');
        
        const videoUrl = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        const a = document.createElement('a');
        a.href = videoUrl;
        a.download = "clipped_video.mp4";
        a.click();

        el.innerText = "Status: Done! Download started.";
    }
</script>
</body>
</html>
